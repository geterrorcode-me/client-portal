version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:///./data/portal.db
      - SECRET_KEY=${SECRET_KEY:-your-super-secret-key-change-in-production}
      - DEBUG=${DEBUG:-false}
      # PENTING: Ubah CORS agar mencakup domain produksi Anda
      - CORS_ORIGINS=https://portal.mjasa.com,https://api.portal.mjasa.com
    volumes:
      - backend_data:/app/data
    
    # GANTI 'ports' DENGAN 'expose'
    expose:
      - "8000" 
    
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # HAPUS BAGIAN NETWORKS MANUAL INI
    # networks:
    #   - nexus-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    restart: unless-stopped
    
    # GANTI 'ports' DENGAN 'expose' JUGA
    expose:
      - "80"
      
    depends_on:
      backend:
        condition: service_healthy
        
    healthcheck:
      # Pastikan endpoint /health ada di Nginx, atau ganti ke '/'
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"] 
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # HAPUS BAGIAN NETWORKS MANUAL INI JUGA
    # networks:
    #   - nexus-network

volumes:
  backend_data:
    driver: local

# HAPUS DEFINISI NETWORK GLOBAL
# networks:
#   nexus-network:
#     driver: bridge
